<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FORM</title>
    <link rel="stylesheet" href="practice.css">
</head>
<body>
    <form>
        <div>
           <label for="fullname">Name</label>
           <br>
           <input type="text" id="fullname" name="fullname" placeholder="Anastacia">
        </div>

        <br>

        <div>
            <label for="address">Email</label>
            <br>
            <input type="email" id="address" name="address" placeholder="spants@gmail.com">
        </div>

        <br>

         <div>
            <label for="age">Age</label>
            <br>
            <input type="number" id="age" name="age">
        </div>

        <br>

         <div>
            <label for="personality">Which option best describes you?</label>
            <br>
            <select id="personality" name="personality">
                <option value="student">Student</option>
                <option>Apprentice</option>
                <option>Beginner</option>
                <option>Advanced</option>
            </select>
        </div>

        <br>

        <div>
            <label title="recommend">Would you recommend GeeksforGeeks to a friend?</label>
            <br>
            <label for="yes">Yes</label>
            <input type="radio" id="yes" name="recommend" value="yes">
            <label for="no">No</label>
            <input type="radio" id="no" name="recommend" value="no">
        </div>

        <br>

        <div>
            <label for="language">Languages and frameworks known</label>
            <br>
            <label for="C">C</label>
            <input type="checkbox" id="C" name="language">

            <br>

            <label for="C++">C++</label>
            <input type="checkbox" id="C++" name="language">

            <br>

            <label for="C=">C=</label>
            <input type="checkbox" id="C=" name="language">

            <br>

            <label for="java">Java</label>
            <input type="checkbox" id="java" name="language">

            <br>

            <label for="python">Python</label>
            <input type="checkbox" id="python" name="language">

            <br>

            <input type="checkbox" id="javascript" name="language">
            <label for="javascript">JavaScript</label>
            
            <br>

            <label for="react">React</label>
            <input type="checkbox" id="react" name="language">

            <br>

            <label for="angular">Angular</label>
            <input type="checkbox" id="angular" name="language">

            <br>

            <label for="django">Django</label>
            <input type="checkbox" id="django" name="language">

            <br>

            <label for="spring">Spring</label>
            <input type="checkbox" id="spring" name="language">
        </div>

        <br>

        <div>
            <label for="comment">Any comments or suggestions</label>
            <br>
            <input type="textarea" id="comment" name="comment" placeholder="Say something">
        </div>

        <br>

        <div>
            <input type="submit" name="tap to submit">
        </div>
    </form>
</body>
</html>
